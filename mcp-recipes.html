<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright Data - MCP Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080C19;
      color: #C8D6E5;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(61,127,252,0.1);
      background: rgba(8,12,25,0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .header-logo span { font-weight: 400; color: #A0C0FF; }
    .header-divider {
      width: 1px;
      height: 24px;
      background: rgba(61,127,252,0.2);
    }
    .header-nav {
      font-size: 14px;
      font-weight: 500;
      color: #7B8FAD;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .header-nav:hover { color: #A0C0FF; background: rgba(61,127,252,0.08); }
    .header-nav.active { color: #fff; background: rgba(61,127,252,0.15); font-weight: 600; }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 80px 40px 60px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 1000px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(61,127,252,0.12) 0%, rgba(160,192,255,0.04) 40%, transparent 70%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 0;
      right: 0;
      height: 200px;
      background:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(61,127,252,0.03) 60px,
          rgba(61,127,252,0.03) 61px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(61,127,252,0.03) 60px,
          rgba(61,127,252,0.03) 61px
        );
      mask-image: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
      pointer-events: none;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      position: relative;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #3D7FFC, #A0C0FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 18px;
      color: #7B8FAD;
      max-width: 620px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Integration Grid ── */
    .integrations-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .integration-card {
      background: linear-gradient(145deg, rgba(61,127,252,0.06) 0%, rgba(8,12,25,0.8) 100%);
      border: 1px solid rgba(61,127,252,0.1);
      border-radius: 14px;
      padding: 24px;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
      cursor: default;
    }
    .integration-card:hover {
      border-color: rgba(61,127,252,0.35);
      box-shadow: 0 8px 32px rgba(61,127,252,0.12), 0 0 0 1px rgba(61,127,252,0.1);
      transform: translateY(-2px);
    }

    /* Logos row */
    .integration-logos {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .integration-logo {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(61,127,252,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(61,127,252,0.06);
      overflow: hidden;
    }
    .integration-logo img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
    .integration-logo img[alt="Reddit"] {
      width: 38px;
      height: 38px;
    }
    .integration-plus {
      font-size: 18px;
      font-weight: 500;
      color: rgba(61,127,252,0.4);
    }

    /* Card content */
    .integration-title {
      font-size: 15px;
      font-weight: 600;
      color: #E8F0FE;
      line-height: 1.4;
    }
    .integration-apps {
      font-size: 13px;
      color: #7B8FAD;
      font-weight: 500;
    }

    /* Card footer */
    .integration-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid rgba(61,127,252,0.08);
      margin-top: auto;
    }
    .integration-platforms {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .integration-platforms img {
      height: 20px;
      opacity: 0.5;
    }
    .integration-card.active-recipe .integration-platforms img {
      opacity: 1;
    }
    .integration-btn {
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(61,127,252,0.06);
      color: #4A5E7A;
      border: none;
      cursor: default;
      pointer-events: none;
      text-decoration: none;
      display: inline-block;
    }
    .integration-btn.btn-active {
      background: rgba(61,127,252,0.12);
      color: #3D7FFC;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
    }
    .integration-btn.btn-active:hover {
      background: #3D7FFC;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Bright_Data.svg/960px-Bright_Data.svg.png" alt="Bright Data" style="height:24px;">
    </div>
    <div class="header-divider"></div>
    <a href="index.html" class="header-nav">Automation Templates</a>
    <a href="mcp-recipes.html" class="header-nav active">MCP Recipes</a>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>Bright Data <em>MCP Recipes</em></h1>
    <p>Connect Bright Data to your favorite AI tools via MCP. Scrape, search, and collect web data directly from Claude or ChatGPT.</p>
  </section>

  <!-- MCP Recipes Grid -->
  <section class="integrations-grid">
  </section>

</body>
</html>
